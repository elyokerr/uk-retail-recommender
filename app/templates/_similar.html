{% if not results %}
<div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-sm text-yellow-800">
  No similar items found for item <strong>{{ item_id }}</strong>. The item may not be in the training data.
</div>
{% else %}
<div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
  <div class="px-6 py-4 border-b border-gray-100">
    <h2 class="text-base font-semibold text-gray-900">
      Similar to <span class="font-mono text-indigo-600">{{ item_id }}</span>
      <span class="ml-2 text-xs font-normal text-gray-400">({{ results|length }} items)</span>
    </h2>
  </div>
  <ul class="divide-y divide-gray-100">
    {% for item_id_r, score in results %}
    <li class="flex justify-between items-center px-6 py-3 hover:bg-gray-50 transition-colors">
      <span class="font-mono text-sm text-gray-800">{{ item_id_r }}</span>
      <span class="font-mono text-sm text-gray-400">{{ "%.4f"|format(score) }}</span>
    </li>
    {% endfor %}
  </ul>
</div>
{% endif %}
