<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK Retail Recommender</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-2xl mx-auto p-4">

    <!-- Header -->
    <div class="mt-8 mb-6 text-center">
      <h1 class="text-3xl font-bold text-gray-900">UK Retail Recommender</h1>
      <p class="mt-2 text-gray-500 text-sm">
        Get product recommendations for any customer in the UK retail dataset.
      </p>
    </div>

    <!-- Form card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
      <form
        hx-get="/recommend"
        hx-target="#results"
        hx-indicator="#spinner"
        class="space-y-5"
      >
        <!-- Customer ID input -->
        <div>
          <label for="customer_id" class="block text-sm font-medium text-gray-700 mb-1">
            Customer ID
          </label>
          <input
            id="customer_id"
            name="customer_id"
            type="number"
            placeholder="e.g. 12345"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
          <p class="mt-1 text-xs text-gray-400">
            Tip: use a known customer from the dataset. Unknown IDs return popular items (cold start).
          </p>
        </div>

        <!-- Number of recommendations -->
        <div>
          <label for="k" class="block text-sm font-medium text-gray-700 mb-1">
            Number of recommendations
          </label>
          <input
            id="k"
            name="k"
            type="number"
            value="10"
            min="1"
            max="50"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-colors duration-150 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
        >
          Get recommendations
        </button>
      </form>
    </div>

    <!-- Spinner (htmx-indicator is hidden by default, shown during request) -->
    <div id="spinner" class="htmx-indicator mt-6 flex items-center justify-center gap-3 text-gray-500 text-sm">
      <svg class="animate-spin h-5 w-5 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
      </svg>
      Loading recommendations&hellip;
    </div>

    <!-- Results target (empty on load, populated by HTMX) -->
    <div id="results" class="mt-6"></div>

    <!-- Footer -->
    <p class="mt-10 mb-6 text-center text-xs text-gray-400">
      UK Retail Recommender &middot; ALS + LambdaMART + Item-to-Item
    </p>

  </div>

</body>
</html>
